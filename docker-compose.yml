# ---
# 📚 POR QUÉ: Orquesta bot + python_engine con healthcheck y dependencias correctas.
#    Sin healthcheck, docker-compose arrancaría el bot antes de que Python esté listo,
#    causando ECONNREFUSED en las primeras peticiones. condition: service_healthy
#    garantiza que /health responde 200 antes de iniciar el bot.
# 📁 ARCHIVO: docker-compose.yml
# ---

services:
  python_engine:
    build:
      context: ./eco-stochast-poc/python_engine
    restart: unless-stopped
    environment:
      - PORT=8000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  bot:
    build:
      context: .
    restart: unless-stopped
    depends_on:
      python_engine:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - PYTHON_API_URL=http://python_engine:8000/simulate_risk
      - NODE_ENV=production
    volumes:
      - bot-data:/app/data

volumes:
  bot-data:
